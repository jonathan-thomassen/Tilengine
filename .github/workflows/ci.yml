name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libpng-dev zlib1g-dev \
            cppcheck clang-tidy valgrind \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxfixes-dev \
            libasound2-dev libpulse-dev libdbus-1-dev

      - name: Install SDL3
        run: |
          SDL_VERSION=3.2.8
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-${SDL_VERSION}.tar.gz" \
            | tar xz
          cmake -S SDL3-${SDL_VERSION} -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build sdl3-build
          sudo cmake --install sdl3-build

      - name: Configure (with sanitizers)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSANITIZE=ON

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: cppcheck
        id: cppcheck
        continue-on-error: true
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --std=c23 \
            -I src -I include \
            --suppress=missingIncludeSystem \
            --suppress=unusedStructMember:src/Window.c \
            --suppress=unusedStructMember:src/ResourcePacker.c \
            --error-exitcode=1 \
            src/ 2>&1 | tee /tmp/cppcheck.log; exit ${PIPESTATUS[0]}

      - name: clang-tidy
        id: clang_tidy
        continue-on-error: true
        run: |
          clang-tidy src/Tilengine.c src/Layer.c src/Sprite.c \
            samples/Intro.c samples/Drawbridge.c \
            -p build 2>&1 | tee /tmp/clang-tidy.log; exit ${PIPESTATUS[0]}

      - name: Configure (Valgrind, no sanitizers)
        run: |
          cmake -S . -B build-valgrind -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build (Valgrind)
        id: build_valgrind
        continue-on-error: true
        run: cmake --build build-valgrind --target Test 2>&1 | tee /tmp/build-valgrind.log; exit ${PIPESTATUS[0]}

      - name: Valgrind
        id: valgrind
        continue-on-error: true
        run: |
          SUPP=""
          [ -f /usr/lib/valgrind/default.supp ] && SUPP="--suppressions=/usr/lib/valgrind/default.supp"
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --track-origins=yes \
            $SUPP \
            build-valgrind/Test 2>&1 | tee /tmp/valgrind.log; exit ${PIPESTATUS[0]}

      - name: Summary
        if: always()
        run: |
          result() { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }

          append_log() {
            local label="$1" log="$2" outcome="$3"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### $label — $(result $outcome)" >> $GITHUB_STEP_SUMMARY
            if [ -s "$log" ]; then
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat "$log" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "_No output._" >> $GITHUB_STEP_SUMMARY
            fi
          }

          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(result ${{ steps.build.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| cppcheck | $(result ${{ steps.cppcheck.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| clang-tidy | $(result ${{ steps.clang_tidy.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (Valgrind) | $(result ${{ steps.build_valgrind.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Valgrind | $(result ${{ steps.valgrind.outcome }}) |" >> $GITHUB_STEP_SUMMARY

          append_log "Build"            /tmp/build.log          "${{ steps.build.outcome }}"
          append_log "cppcheck"         /tmp/cppcheck.log       "${{ steps.cppcheck.outcome }}"
          append_log "clang-tidy"       /tmp/clang-tidy.log     "${{ steps.clang_tidy.outcome }}"
          append_log "Build (Valgrind)" /tmp/build-valgrind.log "${{ steps.build_valgrind.outcome }}"
          append_log "Valgrind"         /tmp/valgrind.log       "${{ steps.valgrind.outcome }}"

      - name: Fail if any check failed
        if: >
          steps.build.outcome != 'success' ||
          steps.cppcheck.outcome != 'success' ||
          steps.clang_tidy.outcome != 'success' ||
          steps.build_valgrind.outcome != 'success' ||
          steps.valgrind.outcome != 'success'
        run: exit 1
