name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libpng-dev zlib1g-dev \
            cppcheck clang-tidy valgrind \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxfixes-dev \
            libasound2-dev libpulse-dev libdbus-1-dev

      - name: Install SDL3
        run: |
          SDL_VERSION=3.2.8
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-${SDL_VERSION}.tar.gz" \
            | tar xz
          cmake -S SDL3-${SDL_VERSION} -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build sdl3-build
          sudo cmake --install sdl3-build

      - name: Configure (with sanitizers)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSANITIZE=ON

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build

      - name: cppcheck
        id: cppcheck
        continue-on-error: true
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --std=c23 \
            -I src -I include \
            --suppress=missingIncludeSystem \
            --suppress=unusedStructMember:src/Window.c \
            --suppress=unusedStructMember:src/ResourcePacker.c \
            --error-exitcode=1 \
            src/

      - name: clang-tidy
        id: clang_tidy
        continue-on-error: true
        run: |
          clang-tidy src/Tilengine.c src/Layer.c src/Sprite.c \
            samples/Intro.c samples/Drawbridge.c \
            -p build

      - name: Configure (Valgrind, no sanitizers)
        run: |
          cmake -S . -B build-valgrind -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build (Valgrind)
        id: build_valgrind
        continue-on-error: true
        run: cmake --build build-valgrind --target Test

      - name: Valgrind
        id: valgrind
        continue-on-error: true
        run: |
          SUPP=""
          [ -f /usr/lib/valgrind/default.supp ] && SUPP="--suppressions=/usr/lib/valgrind/default.supp"
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --track-origins=yes \
            $SUPP \
            build-valgrind/Test

      - name: Summary
        if: always()
        run: |
          pass="✅ Pass"
          fail="❌ Fail"
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cppcheck | ${{ steps.cppcheck.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clang-tidy | ${{ steps.clang_tidy.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (Valgrind) | ${{ steps.build_valgrind.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Valgrind | ${{ steps.valgrind.outcome == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: >
          steps.build.outcome != 'success' ||
          steps.cppcheck.outcome != 'success' ||
          steps.clang_tidy.outcome != 'success' ||
          steps.build_valgrind.outcome != 'success' ||
          steps.valgrind.outcome != 'success'
        run: exit 1
