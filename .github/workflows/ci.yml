name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libpng-dev zlib1g-dev \
            cppcheck clang-tidy valgrind \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxss-dev libxfixes-dev \
            libasound2-dev libpulse-dev libdbus-1-dev

      - name: Cache SDL3
        id: cache_sdl3
        uses: actions/cache@v4
        with:
          path: /opt/sdl3
          key: sdl3-3.2.8-${{ runner.os }}

      - name: Install SDL3
        if: steps.cache_sdl3.outputs.cache-hit != 'true'
        run: |
          SDL_VERSION=3.2.8
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-${SDL_VERSION}.tar.gz" \
            | tar xz
          cmake -S SDL3-${SDL_VERSION} -B sdl3-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/sdl3
          cmake --build sdl3-build
          cmake --install sdl3-build

      - name: Configure (with sanitizers)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSANITIZE=ON \
            -DCMAKE_PREFIX_PATH=/opt/sdl3

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: cppcheck
        id: cppcheck
        continue-on-error: true
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --std=c23 \
            -I src -I include \
            --suppress=missingIncludeSystem \
            --suppress=unusedStructMember:src/Window.c \
            --suppress=unusedStructMember:src/ResourcePacker.c \
            --error-exitcode=1 \
            src/ 2>&1 | tee /tmp/cppcheck.log; exit ${PIPESTATUS[0]}

      - name: clang-tidy
        id: clang_tidy
        continue-on-error: true
        run: |
          clang-tidy \
            src/Tilengine.c src/Layer.c src/Sprite.c \
            src/LoadBitmap.c src/LoadTMX.c src/LoadTilemap.c \
            src/LoadSpriteset.c src/LoadSequencePack.c \
            src/ObjectList.c src/LoadFile.c \
            samples/Shooter.c samples/Racer.c samples/Boss.c \
            samples/Benchmark.c samples/PaletteLayer.c samples/TestMouse.c \
            sc4/Intro.c sc4/Drawbridge.c sc4/Simon.c \
            sc4/Hud.c sc4/Prop.c sc4/Barrel.c \
            -p build 2>&1 | tee /tmp/clang-tidy.log; exit ${PIPESTATUS[0]}

      - name: Configure (Valgrind, no sanitizers)
        run: |
          cmake -S . -B build-valgrind -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH=/opt/sdl3

      - name: Build (Valgrind)
        id: build_valgrind
        continue-on-error: true
        run: cmake --build build-valgrind --target Test 2>&1 | tee /tmp/build-valgrind.log; exit ${PIPESTATUS[0]}

      - name: Valgrind
        id: valgrind
        continue-on-error: true
        run: |
          SUPP=""
          [ -f /usr/lib/valgrind/default.supp ] && SUPP="--suppressions=/usr/lib/valgrind/default.supp"
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --track-origins=yes \
            $SUPP \
            build-valgrind/Test 2>&1 | tee /tmp/valgrind.log; exit ${PIPESTATUS[0]}

      - name: Summary
        if: always()
        run: |
          result() { [ "$1" = "success" ] && echo "✅ Pass" || echo "❌ Fail"; }

          # Appends a diff block with errors in red (-) and warnings in yellow (!)
          # Skips the section entirely if the log has no errors or warnings.
          append_filtered_log() {
            local label="$1" log="$2"
            [ -s "$log" ] || return
            local content
            content=$(grep -iE "error:|warning:" "$log" 2>/dev/null || true)
            [ -z "$content" ] && return
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### $label" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            while IFS= read -r line; do
              if echo "$line" | grep -qi "error:"; then
                echo "- $line" >> $GITHUB_STEP_SUMMARY
              else
                echo "! $line" >> $GITHUB_STEP_SUMMARY
              fi
            done <<< "$content"
            echo '```' >> $GITHUB_STEP_SUMMARY
          }

          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(result ${{ steps.build.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| cppcheck | $(result ${{ steps.cppcheck.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| clang-tidy | $(result ${{ steps.clang_tidy.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (Valgrind) | $(result ${{ steps.build_valgrind.outcome }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Valgrind | $(result ${{ steps.valgrind.outcome }}) |" >> $GITHUB_STEP_SUMMARY

          append_filtered_log "Build"            /tmp/build.log
          append_filtered_log "cppcheck"         /tmp/cppcheck.log
          append_filtered_log "clang-tidy"       /tmp/clang-tidy.log
          append_filtered_log "Build (Valgrind)" /tmp/build-valgrind.log
          append_filtered_log "Valgrind"         /tmp/valgrind.log

      - name: Fail if any check failed
        if: >
          steps.build.outcome != 'success' ||
          steps.cppcheck.outcome != 'success' ||
          steps.clang_tidy.outcome != 'success' ||
          steps.build_valgrind.outcome != 'success' ||
          steps.valgrind.outcome != 'success'
        run: exit 1
